name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "_sass/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "_sass/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}
      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site

      # LinkedIn Auto-Sync with Article Summary
      - name: Check for LinkedIn Sync 🔍
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: check_linkedin
        run: |
          # Get recently changed _posts files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^_posts/" || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog posts changed"
            echo "should_sync=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              echo "Checking file: $file"
              
              # Check for linkedin: true in frontmatter
              if grep -qE "^linkedin:\s*true" "$file"; then
                echo "Found linkedin: true in $file"
                
                # Extract title (remove quotes)
                TITLE=$(grep "^title:" "$file" | head -1 | sed 's/title: *//; s/^["'"'"']*//; s/["'"'"']*$//')
                echo "Title: $TITLE"
                
                # Extract date
                DATE=$(grep "^date:" "$file" | head -1 | sed 's/date: *//; s/^["'"'"']*//; s/["'"'"']*$//')
                if [ -z "$DATE" ]; then
                  DATE=$(date +%Y-%m-%d)
                fi
                
                # Build URL
                YEAR=$(echo $DATE | cut -d'-' -f1)
                SLUG=$(basename "$file" .md | sed 's/^[0-9]*-[0-9]*-[0-9]*-//')
                URL="https://stefaniezhao77.github.io/blog/${YEAR}/${SLUG}/"
                
                # Extract tags and format with # prefix for LinkedIn hashtags
                # Convert [tag1, tag2, tag3] to #tag1 #tag2 #tag3
                TAGS=$(grep "^tags:" "$file" | sed 's/tags: *//; s/^\[//; s/\]$//; s/, */ /g' | sed 's/[^ ]* */#&/g' | sed 's/# /#/g')
                if [ -z "$TAGS" ]; then
                  TAGS="#TechBlog #Programming #AI"
                fi
                echo "Tags: $TAGS"
                
                # Extract article summary (first 150 chars of content after frontmatter)
                # Skip frontmatter (between --- lines) and get first paragraph
                SUMMARY=$(sed '1,/---/d' "$file" | grep -v "^$" | grep -v "^#" | head -5 | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-200)
                # Clean up markdown syntax
                SUMMARY=$(echo "$SUMMARY" | sed 's/\[//g; s/\]//g; s/([^)]*)//g; s/`//g; s/#//g')
                echo "Summary: $SUMMARY"
                
                echo "should_sync=true" >> $GITHUB_OUTPUT
                echo "post_title=$TITLE" >> $GITHUB_OUTPUT
                echo "post_url=$URL" >> $GITHUB_OUTPUT
                echo "post_tags=$TAGS" >> $GITHUB_OUTPUT
                echo "post_summary=$SUMMARY" >> $GITHUB_OUTPUT
                
                exit 0
              fi
            fi
          done
          
          echo "No linkedin: true found in changed files"
          echo "should_sync=false" >> $GITHUB_OUTPUT

      - name: Trigger LinkedIn Post via Make.com 🔗
        if: steps.check_linkedin.outputs.should_sync == 'true'
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          echo "Syncing to LinkedIn via Make.com..."
          echo "Title: ${{ steps.check_linkedin.outputs.post_title }}"
          echo "URL: ${{ steps.check_linkedin.outputs.post_url }}"
          echo "Tags: ${{ steps.check_linkedin.outputs.post_tags }}"
          echo "Summary: ${{ steps.check_linkedin.outputs.post_summary }}"
          
          curl -X POST "${MAKE_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"value1\": \"${{ steps.check_linkedin.outputs.post_title }}\",
              \"value2\": \"${{ steps.check_linkedin.outputs.post_url }}\",
              \"value3\": \"${{ steps.check_linkedin.outputs.post_tags }}\",
              \"value4\": \"${{ steps.check_linkedin.outputs.post_summary }}\"
            }"
          
          echo "LinkedIn sync triggered successfully via Make.com!"
