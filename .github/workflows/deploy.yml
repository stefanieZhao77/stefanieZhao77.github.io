name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "_sass/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "_sass/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}
      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick || true
          pip3 install --upgrade nbconvert || true
          export JEKYLL_ENV=production
          set +e
          bundle exec jekyll build
          set -e
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site

      # LinkedIn Auto-Sync with Article Summary
      - name: Sync LinkedIn Posts 🔗
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          if [ -z "$MAKE_WEBHOOK_URL" ]; then
            echo "ERROR: MAKE_WEBHOOK_URL is not set in repository secrets!"
            exit 1
          fi

          # Get recently changed _posts files
          echo "Checking for changed files..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^_posts/" || true)
          echo "Changed files: $CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog posts changed"
            exit 0
          fi

          SYNC_COUNT=0
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              echo "Checking file: $file"

              # Check for linkedin: true in frontmatter
              if grep -qE "^linkedin:\s*true" "$file"; then
                echo "Found linkedin: true in $file"

                # Extract title (remove quotes)
                TITLE=$(grep "^title:" "$file" | head -1 | sed 's/title: *//; s/^["'"'"']*//; s/["'"'"']*$//')
                echo "Title: $TITLE"

                # Extract date
                DATE=$(grep "^date:" "$file" | head -1 | sed 's/date: *//; s/^["'"'"']*//; s/["'"'"']*$//')
                if [ -z "$DATE" ]; then
                  DATE=$(date +%Y-%m-%d)
                fi

                # Build URL
                YEAR=$(echo $DATE | cut -d'-' -f1)
                SLUG=$(basename "$file" .md | sed 's/^[0-9]*-[0-9]*-[0-9]*-//')
                URL="https://stefaniezhao77.github.io/blog/${YEAR}/${SLUG}/"

                # Extract tags and format with # prefix for LinkedIn hashtags
                TAGS=$(grep "^tags:" "$file" | sed 's/tags: *//; s/^\[//; s/\]$//; s/, */ /g; s/'"'"'//g' | sed 's/[^ ]* */#&/g' | sed 's/# /#/g')
                if [ -z "$TAGS" ]; then
                  TAGS="#TechBlog #Programming #AI"
                fi
                echo "Tags: $TAGS"

                # Extract article summary: skip entire frontmatter (between --- markers),
                # then skip blockquotes (>), images (![), and empty lines, get first meaningful paragraph
                SUMMARY=$(awk '/^---$/{n++; next} n>=2{print}' "$file" | grep -v "^$" | grep -v "^>" | grep -v "^!\[" | grep -v "^#" | head -5 | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-200)
                # Clean up markdown syntax
                SUMMARY=$(echo "$SUMMARY" | sed 's/\[//g; s/\]//g; s/([^)]*)//g; s/`//g; s/\*//g')
                echo "Summary: $SUMMARY"

                if [ -z "$SUMMARY" ]; then
                  echo "WARNING: Could not extract summary from $file, using title as fallback"
                  SUMMARY="$TITLE - A new blog post about technology and development."
                fi

                echo "Sending LinkedIn sync for: $TITLE"
                RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "${MAKE_WEBHOOK_URL}" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"value1\": \"${TITLE}\",
                    \"value2\": \"${URL}\",
                    \"value3\": \"${TAGS}\",
                    \"value4\": \"${SUMMARY}\"
                  }")

                echo "Response: $RESPONSE"
                SYNC_COUNT=$((SYNC_COUNT + 1))
                echo "---"
              fi
            fi
          done

          echo "LinkedIn sync completed. Total posts synced: $SYNC_COUNT"
